<h3>Customer Details</h3>

<app-loading-spinner *ngIf="isLoading" message="Loading customer details..."></app-loading-spinner>
<app-error-message [message]="errorMessage"></app-error-message>

<div class="card shadow" *ngIf="customer">
  <div class="card-body">
    <p><strong>ID:</strong> {{ customer.id }}</p>
    <p><strong>Full Name:</strong> {{ customer.fullName }}</p>
    <p><strong>Email:</strong> {{ customer.email }}</p>
    <p><strong>Phone Number:</strong> {{ customer.phoneNumber }}</p>
    <p><strong>Status:</strong> {{ customer.status }}</p>

    <a routerLink="/customers" class="btn btn-secondary">
      Back to Customers
    </a>
  </div>
</div>
