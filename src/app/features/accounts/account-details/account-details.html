<div class="card shadow">
  <div class="card-header bg-success text-white">
    <h4 class="mb-0">Search Account Details</h4>
  </div>

  <div class="card-body">

    <form [formGroup]="searchForm" (ngSubmit)="searchAccount()" class="mb-3">
      <label class="form-label">Account Number</label>

      <div class="input-group">
        <input type="text" class="form-control" formControlName="accountNumber">
        <button type="submit" class="btn btn-success" [disabled]="searchForm.invalid || isLoading">
          {{ isLoading ? 'Searching...' : 'Search' }}
        </button>
      </div>

      <small class="text-danger"
             *ngIf="searchForm.get('accountNumber')?.touched && searchForm.get('accountNumber')?.invalid">
        Account number is required
      </small>
    </form>
    <app-loading-spinner *ngIf="isLoading" message="Searching account..."></app-loading-spinner>
    <app-error-message [message]="errorMessage"></app-error-message>

    <div class="card mt-3" *ngIf="account">
      <div class="card-header">
        Account Details
      </div>

      <div class="card-body">
        <p><strong>Account Number:</strong> {{ account.accountNumber }}</p>
        <p><strong>Customer ID:</strong> {{ account.customerId }}</p>
        <p><strong>Account Type:</strong> {{ account.accountType }}</p>
        <p><strong>Balance:</strong> {{ account.balance }}</p>
        <p><strong>Status:</strong> {{ account.status }}</p>
      </div>
    </div>

  </div>
</div>
